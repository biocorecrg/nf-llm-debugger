plugins {
    id 'groovy'
    id 'java'
}

group = 'nextflow'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    compileOnly 'io.nextflow:nextflow:24.04.0'
    compileOnly 'org.pf4j:pf4j:3.10.0'
    compileOnly 'org.slf4j:slf4j-api:2.0.7'
}

jar {
    manifest {
        attributes(
            'Plugin-Id': 'nf-llm-debugger',
            'Plugin-Class': 'nextflow.debugger.DebuggerPlugin',
            'Plugin-Version': version,
            'Plugin-Provider': 'Luca Cozzuto'
        )
    }
}
